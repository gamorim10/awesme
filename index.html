document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l of the People\" language */\n  .geo{position:absolute; z-index:22; pointer-events:none;}\n  .geo.left{\n    left:56px; top:46%;\n    display:flex; flex-direction:column; gap:10px; align-items:flex-start;\n    font-family:'Space Mono', monospace; font-size:11px; color:#ffb0b0; letter-spacing:.25em; text-transform:uppercase;\n  }\n  .geo.left .bar{width:120px; height:10px; background:#c31321; box-shadow:0 0 10px rgba(195,19,33,.8);}\n  .geo.left .bar.sm{width:60px; height:6px; background:#7a0712;}\n  .geo.left .bar.xs{width:28px; height:4px; background:#ff2e2e;}\n  .geo.right{\n    right:56px; top:46%;\n    display:flex; flex-direction:column; gap:10px; align-items:flex-end;\n    font-family:'Space Mono', monospace; font-size:11px; color:#ffb0b0; letter-spacing:.25em; text-transform:uppercase;\n  }\n  .geo.right .sq{width:48px;height:48px;border:2px solid #c31321; box-shadow:inset 0 0 12px rgba(195,19,33,.6), 0 0 12px rgba(195,19,33,.5);}\n  .geo.right .sq.filled{background:#c31321;}\n  .geo.right .tri{\n    width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-bottom:32px solid #ff2e2e;\n    filter: drop-shadow(0 0 10px rgba(255,46,46,.7));\n  }\n\n  /* Coordinate readout top-right / bottom-left */\n  .readout{\n    position:absolute; z-index:34; font-family:'Space Mono', monospace;\n    font-size:11px; color:#ff8a8a; letter-spacing:.2em; text-transform:uppercase;\n    line-height:1.6;\n  }\n  .readout.br{right:56px; bottom:260px; text-align:right;}\n  .readout.bl{left:56px; bottom:260px; text-align:left;}\n  .readout b{color:#ffdede; font-weight:700;}\n\n  /* Bottom strip */\n  .strip{\n    position:absolute; left:56px; right:56px; bottom:34px; z-index:35;\n    display:flex; justify-content:space-between; align-items:center;\n    font-family:'Space Mono', monospace; font-size:10px; letter-spacing:.35em; text-transform:uppercase;\n    color:#ff8a8a; opacity:.85;\n    border-top:1px solid rgba(255,46,46,.3); padding-top:10px;  <div class=\"subtitle\">Deep Space Array · Station G-28<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Geometric accents -->\n    <div class=\"geo left\">\n      <div class=\"bar\"><\u002Fdiv>\n      <div class=\"bar sm\"><\u002Fdiv>\n      <div class=\"bar xs\"><\u002Fdiv>\n      <div style=\"margin-top:10px;\">AZ 184.2°<\u002Fdiv>\n      <div>EL 61.7°<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"geo right\">\n      <div class=\"sq filled\"><\u002Fdiv>\n      <div class=\"sq\"><\u002Fdiv>\n      <div class=\"tri\"><\u002Fdiv>\n      <div style=\"margin-top:10px;\">PWR ▮▮▮▮▮<\u002Fdiv>\n      <div>LOCK · ON<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- The dish -->\n    <div class=\"scene\">\n      <svg class=\"dish\" viewBox=\"-320 -320 640 640\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <defs>\n          <radialGradient id=\"dishFace\" cx=\"0\" cy=\"-20\" r=\"260\" gradientUnits=\"userSpaceOnUse\">\n            <stop offset=\"0%\" stop-color=\"#2a0a0e\"><\u002Fstop>\n            <stop offset=\"55%\" stop-color=\"#0d0305\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#050204\"><\u002Fstop>\n          <\u002FradialGradient>\n          <linearGradient id=\"rim\" x1=\"0\" y1=\"-260\" x2=\"0\" y2=\"40\" gradientUnits=\"userSpaceOnUse\">\n            <stop offset=\"0%\" stop-color=\"#ff4d4d\"><\u002Fstop>\n            <stop offset=\"60%\" stop-color=\"#c31321\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#4a0a10\"><\u002Fstop>\n          <\u002FlinearGradient>\n          <linearGradient id=\"truss\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#3a0a10\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#120306\"><\u002Fstop>\n          <\u002FlinearGradient>\n          <filter id=\"softglow\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n            <feGaussianBlur stdDeviation=\"4\" result=\"b\"><\u002FfeGaussianBlur>\n            <feMerge><feMergeNode in=\"b\"><\u002FfeMergeNode><feMergeNode in=\"SourceGraphic\"><\u002FfeMergeNode><\u002FfeMerge>\n          <\u002Ffilter>\n        <\u002Fdefs>\n\n        <!-- Ground shadow ellipse -->\n        <ellipse cx=\"0\" cy=\"240\" rx=\"260\" ry=\"24\" fill=\"rgba(195,19,33,.2)\" filter=\"url(#softglow)\"><\u002Fellipse>\n\n        <!-- Support lattice (pylon) -->\n        <g stroke=\"#c31321\" stroke-width=\"2\" fill=\"none\" opacity=\".9\">\n          <path d=\"M -80 240 L -40 40 L 40 40 L 80 240 Z\"><\u002Fpath>\n          <line x1=\"-80\" y1=\"240\" x2=\"40\" y2=\"40\"><\u002Fline>\n          <line x1=\"80\" y1=\"240\" x2=\"-40\" y2=\"40\"><\u002Fline>\n          <line x1=\"-60\" y1=\"140\" x2=\"60\" y2=\"140\"><\u002Fline>\n          <line x1=\"-50\" y1=\"90\" x2=\"50\" y2=\"90\"><\u002Fline>\n          <line x1=\"-70\" y1=\"190\" x2=\"70\" y2=\"190\"><\u002Fline>\n        <\u002Fg>\n\n        <!-- Base platform -->\n        <rect x=\"-120\" y=\"240\" width=\"240\" height=\"14\" fill=\"#120306\" stroke=\"#c31321\" stroke-width=\"2\"><\u002Frect>\n        <rect x=\"-160\" y=\"254\" width=\"320\" height=\"6\" fill=\"#7a0712\"><\u002Frect>\n\n        <!-- Dish (ellipse to show perspective) -->\n        <g transform=\"translate(0,-40)\">\n          <!-- back of dish -->\n          <ellipse cx=\"0\" cy=\"10\" rx=\"260\" ry=\"70\" fill=\"#0a0205\" stroke=\"url(#rim)\" stroke-width=\"3\"><\u002Fellipse>\n          <!-- face -->\n          <ellipse cx=\"0\" cy=\"0\" rx=\"260\" ry=\"80\" fill=\"url(#dishFace)\" stroke=\"url(#rim)\" stroke-width=\"3\"><\u002Fellipse>\n          <!-- concentric parabolic rings -->\n          <g fill=\"none\" stroke=\"#c31321\" stroke-width=\"1.2\" opacity=\".75\">\n            <ellipse cx=\"0\" cy=\"-2\" rx=\"230\" ry=\"66\"><\u002Fellipse>\n            <ellipse cx=\"0\" cy=\"-4\" rx=\"195\" ry=\"54\"><\u002Fellipse>\n            <ellipse cx=\"0\" cy=\"-6\" rx=\"155\" ry=\"42\"><\u002Fellipse>\n            <ellipse cx=\"0\" cy=\"-8\" rx=\"110\" ry=\"28\"><\u002Fellipse>\n            <ellipse cx=\"0\" cy=\"-10\" rx=\"60\" ry=\"14\"><\u002Fellipse>\n          <\u002Fg>\n          <!-- radial ribs -->\n          <g stroke=\"#7a0712\" stroke-width=\"1\" opacity=\".9\">\n            <line x1=\"-260\" y1=\"0\" x2=\"260\" y2=\"0\"><\u002Fline>\n            <line x1=\"-250\" y1=\"-30\" x2=\"250\" y2=\"30\"><\u002Fline>\n            <line x1=\"-250\" y1=\"30\" x2=\"250\" y2=\"-30\"><\u002Fline>\n            <line x1=\"-200\" y1=\"-55\" x2=\"200\" y2=\"55\"><\u002Fline>\n            <line x1=\"-200\" y1=\"55\" x2=\"200\" y2=\"-55\"><\u002Fline>\n            <line x1=\"0\" y1=\"-80\" x2=\"0\" y2=\"80\"><\u002Fline>\n          <\u002Fg>\n\n          <!-- focal point mast (tripod holding receiver) -->\n          <g stroke=\"#c31321\" stroke-width=\"2\" fill=\"none\">\n            <line x1=\"-180\" y1=\"-18\" x2=\"0\" y2=\"-150\"><\u002Fline>\n            <line x1=\"180\" y1=\"-18\" x2=\"0\" y2=\"-150\"><\u002Fline>\n            <line x1=\"0\" y1=\"-40\" x2=\"0\" y2=\"-150\"><\u002Fline>\n          <\u002Fg>\n          <!-- receiver pod -->\n          <rect x=\"-18\" y=\"-166\" width=\"36\" height=\"22\" fill=\"#1a0306\" stroke=\"#ff2e2e\" stroke-width=\"2\"><\u002Frect>\n          <circle cx=\"0\" cy=\"-155\" r=\"3\" fill=\"#ff4d4d\">\n            <animate attributeName=\"opacity\" values=\"1;.3;1\" dur=\"1.6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n          <\u002Fcircle>\n\n          <!-- tick marks around rim -->\n          <g stroke=\"#ff2e2e\" stroke-width=\"1.5\" opacity=\".9\">\n            <line x1=\"-260\" y1=\"0\" x2=\"-276\" y2=\"0\"><\u002Fline>\n            <line x1=\"260\" y1=\"0\" x2=\"276\" y2=\"0\"><\u002Fline>\n            <line x1=\"-200\" y1=\"-52\" x2=\"-212\" y2=\"-56\"><\u002Fline>\n            <line x1=\"200\" y1=\"-52\" x2=\"212\" y2=\"-56\"><\u002Fline>\n            <line x1=\"-130\" y1=\"-74\" x2=\"-136\" y2=\"-80\"><\u002Fline>\n            <line x1=\"130\" y1=\"-74\" x2=\"136\" y2=\"-80\"><\u002Fline>\n            <line x1=\"0\" y1=\"-80\" x2=\"0\" y2=\"-90\"><\u002Fline>\n          <\u002Fg>\n        <\u002Fg>\n\n        <!-- emitted glow at receiver -->\n        <circle cx=\"0\" cy=\"-195\" r=\"14\" fill=\"#ff2e2e\" opacity=\".9\" filter=\"url(#softglow)\">\n          <animate attributeName=\"r\" values=\"10;18;10\" dur=\"1.8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n        <\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <div class=\"horizon\"><\u002Fdiv>\n\n    <!-- Waveform -->\n    <div class=\"wave\">\n      <svg viewBox=\"0 0 800 70\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n        <defs>\n          <linearGradient id=\"wg\" x1=\"0\" x2=\"1\" y1=\"0\" y2=\"0\">\n            <stop offset=\"0%\" stop-color=\"rgba(195,19,33,0)\"><\u002Fstop>\n            <stop offset=\"15%\" stop-color=\"#c31321\"><\u002Fstop>\n            <stop offset=\"50%\" stop-color=\"#ff2e2e\"><\u002Fstop>\n            <stop offset=\"85%\" stop-color=\"#c31321\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"rgba(195,19,33,0)\"><\u002Fstop>\n          <\u002FlinearGradient>\n        <\u002Fdefs>\n        <path id=\"wavepath\" d=\"\" fill=\"none\" stroke=\"url(#wg)\" stroke-width=\"1.5\"><\u002Fpath>\n        <path id=\"wavepath2\" d=\"\" fill=\"none\" stroke=\"rgba(255,46,46,.35)\" stroke-width=\"1\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- Readouts -->\n    <div class=\"readout bl\">\n      <div>SRC: <b>GABRIEL-01<\u002Fb><\u002Fdiv>\n      <div>ORIGIN: <b>TERRA · BR<\u002Fb><\u002Fdiv>\n      <div>AGE: <b>+1 YR<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"readout br\">\n      <div>RA 18H 36M<\u002Fdiv>\n      <div>DEC +38° 47′<\u002Fdiv>\n      <div>SNR 42.7 DB<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Lower date block -->\n    <div class=\"lower\">\n      <div class=\"date\">01 MAIO <span class=\"dot-sep\">·<\u002Fspan> 16H00<\u002Fdiv>\n      <div class=\"venue\"><span class=\"pin\"><\u002Fspan>AV. IBIJAU 45 &nbsp;·&nbsp; SALÃO DE FESTAS<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:14px;\">RSVP · Traga sua antena<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Side vertical labels -->\n    <div class=\"vertlabel\">SIGNAL INTEGRITY · NOMINAL<\u002Fdiv>\n    <div class=\"vertlabel-l\">PROJECT: WILL OF THE PEOPLE<\u002Fdiv>\n\n    <!-- Bottom strip -->\n    <div class=\"strip\">\n      <div>FILE · 04.26 / G.SIG<\u002Fdiv>\n      <div>◢◤ CONFIDENTIAL — EARS ONLY ◥◣<\u002Fdiv>\n      <div>TX · 001<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Overlays -->\n    <div class=\"noise\"><\u002Fdiv>\n    <div class=\"scan\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Scale 900x1600 stage to viewport\n  (function(){\n    const stage = document.getElementById('stage');\n    const scaler = document.getElementById('scaler');\n    function fit(){\n      const vw = window.innerWidth - 24;\n      const vh = window.innerHeight - 24;\n      const s = Math.min(vw/900, vh/1600);\n      scaler.style.transform = `scale(${s})`;\n      scaler.style.width = '900px';\n      scaler.style.height = '1600px';\n      scaler.style.transformOrigin = 'center center';\n    }\n    window.addEventListener('resize', fit);\n    fit();\n  })();\n\n  // Waveform\n  (function(){\n    const p1 = document.getElementById('wavepath');\n    const p2 = document.getElementById('wavepath2');\n    const W=800, H=70, MID=H/2;\n    let t=0;\n    function pulse(x, center, width, amp){\n      const d = (x-center)/width;\n      return amp * Math.exp(-d*d*6) * Math.sin(d*9);\n    }\n    function frame(){\n      t += 0.04;\n      const pts1=[], pts2=[];\n      for(let x=0;x<=W;x+=4){\n        // baseline hum + traveling pulses\n        let y = Math.sin((x*0.06)+t)*1.2\n              + Math.sin((x*0.22)-t*1.6)*0.8;\n        // rhythmic pulses at two positions\n        const c1 = (W*0.28 + Math.sin(t*0.6)*30);\n        const c2 = (W*0.72 + Math.cos(t*0.4)*30);\n        y += pulse(x, c1, 40, 22);\n        y += pulse(x, c2, 28, 14);\n        pts1.push([x, MID+y]);\n\n        let y2 = Math.sin((x*0.09)-t*1.3)*1.6\n               + Math.cos((x*0.17)+t*0.8)*1.0;\n        y2 += pulse(x, c1-10, 50, 10);\n        y2 += pulse(x, c2+14, 34, 8);\n        pts2.push([x, MID+y2]);\n      }\n      p1.setAttribute('d', 'M '+pts1.map(p=>p[0]+' '+p[1].toFixed(2)).join(' L '));\n      p2.setAttribute('d', 'M '+pts2.map(p=>p[0]+' '+p[1].toFixed(2)).join(' L '));\n      requestAnimationFrame(frame);\n    }\n    frame();\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
